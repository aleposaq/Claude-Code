<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#070a18" />
  <title>PRISM v2 — Build &amp; Fire</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/style2.css" />
</head>
<body>
  <div id="app">
    <!-- MENU -->
    <section id="screen-menu2" class="screen screen2 active">
      <div class="menu-inner">
        <div class="logo"><h1>PRISM</h1></div>
        <div class="tagline">build · fire · refine</div>
        <div class="menu-stars" id="menu-stars2">0 / 0</div>
        <div class="menu-buttons">
          <button class="btn btn-primary" id="btn-play2">PLAY</button>
        </div>
        <div class="v2-badge">v2 preview · World 1: Foundry</div>
        <div class="level-grid2" id="level-grid2"></div>
      </div>
    </section>

    <!-- GAME -->
    <section id="screen-game2" class="screen screen2">
      <div class="topbar">
        <button class="icon-btn" id="btn-quit2">‹</button>
        <div class="level-meta"><span class="world-tag" id="lvl-par2">PAR 1</span><span class="level-name" id="lvl-name2">—</span></div>
        <div style="width:42px"></div>
      </div>
      <div class="hud">
        <div class="pill"><span class="pill-ico">◆</span> pieces <b id="pieces-stat">0 / 0</b></div>
        <div class="pill"><span class="pill-ico">⚡</span> fires <b id="fires-stat">0</b></div>
      </div>
      <div class="board-wrap"><canvas id="board2"></canvas></div>
      <div class="tray" id="tray2"></div>
      <div class="controls">
        <button class="btn btn-small btn-ghost" id="btn-clear2">CLEAR</button>
        <button class="btn btn-fire" id="btn-fire">⚡ FIRE</button>
      </div>
    </section>

    <!-- WIN -->
    <div class="modal" id="modal-win2">
      <div class="modal-card win-card">
        <div class="win-rays"></div>
        <h2 id="win2-title">SOLVED</h2>
        <div class="stars-row" id="win2-stars"><span class="s star">★</span><span class="s star">★</span><span class="s star">★</span></div>
        <p class="win-stats" id="win2-stats"></p>
        <div class="modal-buttons">
          <button class="btn btn-small btn-ghost" id="btn-levels2">LEVELS</button>
          <button class="btn btn-small" id="btn-replay2">REPLAY</button>
          <button class="btn btn-small btn-primary" id="btn-next2">NEXT</button>
        </div>
      </div>
    </div>
  </div>

  <script src="js/engine2.js"></script>
  <script src="js/levels2.js"></script>
  <script src="js/audio.js"></script>
  <script src="js/render2.js"></script>
  <script src="js/game2.js"></script>
</body>
</html>
